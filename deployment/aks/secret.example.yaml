apiVersion: v1
kind: Secret
metadata:
  name: pim-magento-secrets
  namespace: pim-magento-demo
type: Opaque
stringData:
  APP_HOST: 0.0.0.0
  APP_PORT: "8000"
  AZURE_OPENAI_ENDPOINT: https://YOUR_OPENAI_RESOURCE.openai.azure.com/
  AZURE_OPENAI_API_KEY: YOUR_OPENAI_KEY
  AZURE_OPENAI_CHAT_DEPLOYMENT: gpt-4o-mini
  AZURE_OPENAI_API_VERSION: 2024-10-21
  AZURE_SEARCH_ENDPOINT: https://YOUR_SEARCH_SERVICE.search.windows.net
  AZURE_SEARCH_API_KEY: YOUR_SEARCH_KEY
  AZURE_SEARCH_INDEX: magento-guidance-index
  DEFAULT_TOP_K: "3"
  APPROVAL_STORE_PATH: /tmp/approvals.json
  MAGENTO_BASE_URL: https://your-commerce.example.com
  MAGENTO_ADMIN_USERNAME: admin
  MAGENTO_ADMIN_PASSWORD: change-me
  MAGENTO_STORE_CODE: default
